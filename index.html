<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Learning Hub</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* ── App shell reset ── */
    html, body {
      height: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #16213e;
    }

    .app {
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 256px 1fr 228px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .app-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: #0f0f1a;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .app-logo {
      font-family: var(--font-sans);
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: -0.01em;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .app-logo svg {
      opacity: 0.7;
    }

    .search-wrapper {
      flex: 1;
      max-width: 400px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 6px 10px 6px 30px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      font-size: 0.82rem;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .search-input:focus {
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.11);
    }

    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.78rem;
      pointer-events: none;
    }

    .header-spacer { flex: 1; }

    .lesson-badge {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.3);
      white-space: nowrap;
    }

    /* ── Sidebar ── */
    .sidebar-nav {
      background: #16213e;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      overflow-y: auto;
      padding: 10px 0 20px;
    }

    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .nav-category {
      margin-bottom: 4px;
    }

    .nav-category-label {
      font-family: var(--font-sans);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.28);
      padding: 10px 14px 4px;
      display: block;
    }

    .nav-lesson-btn {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      width: 100%;
      padding: 6px 14px 6px 12px;
      border: none;
      border-left: 2px solid transparent;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      font-family: var(--font-sans);
      font-size: 0.78rem;
      text-align: left;
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
      line-height: 1.35;
    }

    .nav-lesson-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.85);
    }

    .nav-lesson-btn.active {
      background: rgba(176, 0, 0, 0.18);
      color: #fff;
      border-left-color: #b00;
    }

    .nav-lesson-num {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      color: rgba(255, 255, 255, 0.22);
      min-width: 26px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    /* ── Content Area ── */
    .content-area {
      overflow-y: auto;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    .content-area::-webkit-scrollbar { width: 4px; }
    .content-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .content-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    /* hide the old per-lesson nav */
    .content-body .nav-links { display: none !important; }

    /* Table styles (not in original style.css) */
    .content-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2rem 0;
      font-family: var(--font-sans);
      font-size: 0.86rem;
    }
    .content-body th,
    .content-body td {
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    .content-body th {
      background: var(--code-bg);
      font-weight: 600;
    }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }

    .welcome h2 {
      font-family: var(--font-sans);
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      border: none;
      margin-top: 0;
    }

    .welcome p {
      font-family: var(--font-sans);
      font-size: 0.88rem;
      margin-top: 0.4rem;
    }

    .welcome-hint {
      margin-top: 1.5rem;
      padding: 1rem 1.5rem;
      background: #fff8e1;
      border-left: 3px solid #f0a500;
      border-radius: 0 4px 4px 0;
      font-family: var(--font-sans);
      font-size: 0.82rem;
      color: #555;
      text-align: left;
      max-width: 380px;
    }

    /* Loading */
    .loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: 0.88rem;
    }

    /* ── TOC Panel ── */
    .toc-panel {
      background: #fafaf8;
      border-left: 1px solid #e8e8e3;
      overflow-y: auto;
      padding: 12px 0;
    }

    .toc-panel::-webkit-scrollbar { width: 3px; }
    .toc-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .toc-section-label {
      font-family: var(--font-sans);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #aaa;
      padding: 0 14px 6px;
      display: block;
    }

    .toc-item {
      display: block;
      padding: 5px 14px;
      font-family: var(--font-sans);
      font-size: 0.76rem;
      color: #777;
      text-decoration: none;
      line-height: 1.4;
      border-left: 2px solid transparent;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }

    .toc-item:hover {
      color: #1a1a1a;
      background: rgba(0, 0, 0, 0.04);
    }

    .toc-item.active {
      color: #b00;
      border-left-color: #b00;
      background: rgba(176, 0, 0, 0.05);
    }

    .toc-item.toc-h3 {
      padding-left: 22px;
      font-size: 0.71rem;
      color: #999;
    }

    .toc-item.toc-h3.active { color: #b00; }

    .toc-placeholder {
      padding: 12px 14px;
      font-family: var(--font-sans);
      font-size: 0.78rem;
      color: #bbb;
      font-style: italic;
    }

    /* ── Search Results Overlay ── */
    .search-results {
      position: fixed;
      top: 52px;
      left: 256px;
      right: 228px;
      max-height: 55vh;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd;
      border-top: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
      z-index: 200;
      display: none;
    }

    .search-results.open { display: block; }
    .search-results::-webkit-scrollbar { width: 4px; }
    .search-results::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .search-result-item {
      padding: 12px 18px;
      border-bottom: 1px solid #f0f0ec;
      cursor: pointer;
      transition: background 0.12s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #f9f9f5; }

    .search-result-title {
      font-family: var(--font-sans);
      font-size: 0.86rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 3px;
    }

    .search-result-cat {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      color: #b00;
      margin-bottom: 4px;
    }

    .search-result-excerpt {
      font-family: var(--font-sans);
      font-size: 0.76rem;
      color: #777;
      line-height: 1.5;
    }

    .search-result-excerpt mark {
      background: #fff3cd;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
      font-style: normal;
    }

    .search-no-result {
      padding: 20px;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 0.84rem;
      color: #aaa;
    }

    .search-indexing {
      padding: 12px 18px;
      font-family: var(--font-sans);
      font-size: 0.82rem;
      color: #999;
    }

    /* ── Keyboard nav indicator ── */
    .kbd-hint {
      margin-left: auto;
      font-family: var(--font-sans);
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
    }

    .kbd {
      display: inline-block;
      padding: 1px 4px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3px;
      font-size: 0.65rem;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="app-logo">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="2" width="14" height="10" rx="2" stroke="white" stroke-width="1.5"/>
        <path d="M5 14h6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M4 6l3 2-3 2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 10h3" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Backend Log
    </div>

    <div class="search-wrapper">
      <span class="search-icon">⌕</span>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="레슨 내용 검색 (개념, 코드, 설명...)"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="header-spacer"></div>
    <div class="kbd-hint"><span class="kbd">←</span> <span class="kbd">→</span> 이전·다음 레슨</div>
    <div class="lesson-badge" id="lessonBadge">레슨 11개</div>
  </header>

  <!-- ── Sidebar ── -->
  <nav class="sidebar-nav" id="sidebarNav" aria-label="레슨 목록"></nav>

  <!-- ── Content ── -->
  <main class="content-area" id="contentArea" tabindex="0">
    <div class="welcome">
      <h2>백엔드 학습 허브</h2>
      <p>좌측 메뉴에서 레슨을 선택하세요</p>
      <p>상단 검색창으로 전체 내용을 검색할 수 있습니다</p>
      <div class="welcome-hint">
        💡 <strong>파일로 직접 열면</strong> 레슨 로딩이 안 될 수 있습니다.<br>
        터미널에서 이 폴더로 이동 후<br>
        <code style="font-family:var(--font-mono);font-size:0.85em">python3 -m http.server 8080</code><br>
        을 실행하고 <code style="font-family:var(--font-mono);font-size:0.85em">http://localhost:8080</code> 으로 접속하세요.
      </div>
    </div>
  </main>

  <!-- ── TOC ── -->
  <aside class="toc-panel" id="tocPanel" aria-label="현재 레슨 목차">
    <span class="toc-section-label">이 레슨의 목차</span>
    <div class="toc-placeholder">레슨을 선택하면<br>목차가 표시됩니다</div>
  </aside>

</div>

<!-- ── Search Results Overlay ── -->
<div class="search-results" id="searchResults" role="listbox" aria-label="검색 결과"></div>

<script>
/* ──────────────────────────────────────────
   Lesson manifest
────────────────────────────────────────── */
const LESSONS = [
  {
    id: '0001',
    title: '레슨 1 — Ruby의 ? ! &.',
    short: 'Ruby 메서드 컨벤션',
    file: 'lessons/0001-ruby-truthiness-and-short-circuit.html',
    category: 'Ruby 기초'
  },
  {
    id: '0002',
    title: '레슨 2 — 상속 vs 믹스인, Grape mount',
    short: '모듈 시스템과 API 구조',
    file: 'lessons/0002-mixin-vs-inheritance-and-grape-mount.html',
    category: 'Grape API'
  },
  {
    id: '0003',
    title: '레슨 3 — GET 요청이 JSON이 되기까지',
    short: 'Grape API 요청 흐름',
    file: 'lessons/0003-grape-api-request-flow.html',
    category: 'Grape API'
  },
  {
    id: '0004',
    title: '레슨 4 — Entity의 두 가지 의미',
    short: 'Grape::Entity vs DB Entity',
    file: 'lessons/0004-entity-two-meanings.html',
    category: '엔티티·도메인'
  },
  {
    id: '0005',
    title: '레슨 5 — SQL JOIN 완전 정복',
    short: 'INNER JOIN · LEFT OUTER JOIN',
    file: 'lessons/0005-sql-joins.html',
    category: 'SQL·쿼리'
  },
  {
    id: '0006',
    title: '레슨 6 — 도메인과 엔티티',
    short: 'DDD · 책임 분리',
    file: 'lessons/0006-domain-vs-entity.html',
    category: '엔티티·도메인'
  },
  {
    id: '0007',
    title: '레슨 7 — 서브쿼리',
    short: 'SQL 서브쿼리 · ActiveRecord',
    file: 'lessons/0007-subquery.html',
    category: 'SQL·쿼리'
  },
  {
    id: '0008',
    title: '레슨 8 — ActiveRecord 연관관계',
    short: 'belongs_to · has_many · joins',
    file: 'lessons/0008-active-record-associations.html',
    category: 'ActiveRecord'
  },
  {
    id: '0009',
    title: '레슨 9 — N+1 문제',
    short: 'preload · includes · eager_load',
    file: 'lessons/0009-n-plus-1.html',
    category: 'ActiveRecord'
  },
  {
    id: '0010',
    title: '레슨 10 — Grape Entity와 N+1 추적',
    short: 'expose DSL · Entity 흐름',
    file: 'lessons/0010-grape-entity-and-n-plus-1-trace.html',
    category: 'Grape API'
  },
  {
    id: '0011',
    title: '레슨 11 — ActiveRecord::Base와 모델 레이어',
    short: 'ApplicationRecord · 테이블 자동 매핑',
    file: 'lessons/0011-activerecord-base-and-model-layer.html',
    category: 'ActiveRecord'
  },
  {
    id: '0012',
    title: '레슨 12 — Pundit 권한 체크와 rescue_from',
    short: 'authorize · Policy · 403 흐름',
    file: 'lessons/0012-pundit-authorize-and-rescue-from.html',
    category: 'Grape API'
  },
  {
    id: '0013',
    title: '레슨 13 — ActiveRecord 쿼리 메서드',
    short: 'find · find_by · where · Relation',
    file: 'lessons/0013-activerecord-query-methods.html',
    category: 'ActiveRecord'
  },
  {
    id: '0014',
    title: '레슨 14 — Scope와 validates',
    short: 'scope · kept · validates · RecordInvalid',
    file: 'lessons/0014-activerecord-scope-and-validates.html',
    category: 'ActiveRecord'
  }
];

const CATEGORY_ORDER = ['Ruby 기초', 'Grape API', '엔티티·도메인', 'SQL·쿼리', 'ActiveRecord'];

/* ──────────────────────────────────────────
   State
────────────────────────────────────────── */
let currentLessonIndex = -1;
let searchIndex = [];
let searchIndexReady = false;
let searchIndexPending = false;
let scrollObserver = null;

/* ──────────────────────────────────────────
   Sidebar
────────────────────────────────────────── */
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';

  CATEGORY_ORDER.forEach(category => {
    const lessons = LESSONS.filter(lesson => lesson.category === category);
    if (!lessons.length) return;

    const section = document.createElement('div');
    section.className = 'nav-category';

    const label = document.createElement('span');
    label.className = 'nav-category-label';
    label.textContent = category;
    section.appendChild(label);

    lessons.forEach(lesson => {
      const lessonIndex = LESSONS.indexOf(lesson);
      const btn = document.createElement('button');
      btn.className = 'nav-lesson-btn';
      btn.dataset.index = lessonIndex;
      btn.setAttribute('aria-label', lesson.title);

      const numSpan = document.createElement('span');
      numSpan.className = 'nav-lesson-num';
      numSpan.textContent = lesson.id;

      const titleSpan = document.createElement('span');
      titleSpan.textContent = lesson.short;

      btn.appendChild(numSpan);
      btn.appendChild(titleSpan);
      btn.addEventListener('click', () => loadLesson(lessonIndex));
      section.appendChild(btn);
    });

    nav.appendChild(section);
  });
}

/* ──────────────────────────────────────────
   Load Lesson
────────────────────────────────────────── */
async function loadLesson(index) {
  if (index < 0 || index >= LESSONS.length) return;

  const lesson = LESSONS[index];
  currentLessonIndex = index;

  // Update sidebar active state
  document.querySelectorAll('.nav-lesson-btn').forEach(btn => {
    btn.classList.toggle('active', Number(btn.dataset.index) === index);
  });

  // Scroll active button into view in sidebar
  const activeBtn = document.querySelector('.nav-lesson-btn.active');
  if (activeBtn) {
    activeBtn.scrollIntoView({ block: 'nearest' });
  }

  const contentArea = document.getElementById('contentArea');
  contentArea.innerHTML = '<div class="loading-msg">레슨 불러오는 중...</div>';
  renderTOCPlaceholder('로딩 중...');

  try {
    const response = await fetch(lesson.file);
    if (!response.ok) throw new Error(`HTTP ${response.status}: ${lesson.file}`);
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Strip navigation and scripts (scripts re-added below)
    doc.querySelectorAll('.nav-links').forEach(element => element.remove());

    // Inject content
    const wrapper = document.createElement('div');
    wrapper.className = 'content-body';
    wrapper.innerHTML = doc.body.innerHTML;
    contentArea.innerHTML = '';
    contentArea.appendChild(wrapper);
    contentArea.scrollTop = 0;

    // Re-execute inline scripts (for quiz logic)
    wrapper.querySelectorAll('script').forEach(oldScript => {
      const newScript = document.createElement('script');
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });

    // Build TOC and scroll spy
    buildTOC(wrapper, contentArea);

    // Update URL
    history.replaceState({ lessonIndex: index }, '', `#${lesson.id}`);

    // Update page title
    document.title = `${lesson.title} — Backend Log`;

  } catch (error) {
    contentArea.innerHTML = `
      <div class="content-body">
        <h1 style="color:#b00">레슨을 불러오지 못했습니다</h1>
        <p style="font-family:var(--font-sans);font-size:0.9rem;margin-top:1rem;color:#555">
          <strong>원인:</strong> ${error.message}
        </p>
        <div class="mission-link" style="margin-top:1.5rem">
          <strong>해결 방법</strong><br>
          터미널에서 이 폴더로 이동 후<br>
          <code style="font-family:var(--font-mono)">python3 -m http.server 8080</code><br>
          을 실행하고 <code style="font-family:var(--font-mono)">http://localhost:8080</code> 으로 접속하세요.
        </div>
      </div>
    `;
    renderTOCPlaceholder('로드 실패');
    console.error('[Backend Log] Failed to load lesson:', error);
  }
}

/* ──────────────────────────────────────────
   TOC
────────────────────────────────────────── */
function renderTOCPlaceholder(message) {
  const panel = document.getElementById('tocPanel');
  panel.innerHTML = `
    <span class="toc-section-label">이 레슨의 목차</span>
    <div class="toc-placeholder">${message}</div>
  `;
}

function buildTOC(contentEl, scrollRoot) {
  const panel = document.getElementById('tocPanel');
  const headings = Array.from(contentEl.querySelectorAll('h2, h3'));

  if (!headings.length) {
    renderTOCPlaceholder('목차 없음');
    return;
  }

  // Assign IDs to headings
  headings.forEach((heading, index) => {
    if (!heading.id) {
      heading.id = `toc-anchor-${index}`;
    }
  });

  // Build TOC HTML
  const parts = ['<span class="toc-section-label">이 레슨의 목차</span>'];
  headings.forEach(heading => {
    const level = heading.tagName.toLowerCase();
    const text = heading.textContent.trim();
    parts.push(
      `<a class="toc-item toc-${level}" href="#${heading.id}" data-id="${heading.id}">${text}</a>`
    );
  });
  panel.innerHTML = parts.join('');

  // TOC click → smooth scroll within content area
  panel.querySelectorAll('.toc-item').forEach(link => {
    link.addEventListener('click', event => {
      event.preventDefault();
      const target = document.getElementById(link.dataset.id);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // Scroll spy
  setupScrollSpy(headings, scrollRoot);
}

function setupScrollSpy(headings, scrollRoot) {
  if (scrollObserver) scrollObserver.disconnect();

  scrollObserver = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const targetId = entry.target.id;
          document.querySelectorAll('.toc-item').forEach(item => {
            item.classList.toggle('active', item.dataset.id === targetId);
          });
        }
      });
    },
    {
      root: scrollRoot,
      rootMargin: '-8% 0px -72% 0px',
      threshold: 0
    }
  );

  headings.forEach(heading => scrollObserver.observe(heading));
}

/* ──────────────────────────────────────────
   Search index
────────────────────────────────────────── */
async function buildSearchIndex() {
  if (searchIndexReady || searchIndexPending) return;
  searchIndexPending = true;

  const results = await Promise.allSettled(
    LESSONS.map(async lesson => {
      const response = await fetch(lesson.file);
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('script, style, .nav-links').forEach(element => element.remove());
      const text = (doc.body.textContent || '').replace(/\s+/g, ' ').trim();
      return { ...lesson, text };
    })
  );

  searchIndex = results
    .filter(result => result.status === 'fulfilled')
    .map(result => result.value);

  searchIndexReady = true;
  searchIndexPending = false;
}

function getExcerpt(text, query) {
  const lower = text.toLowerCase();
  const queryLower = query.toLowerCase();
  const matchIndex = lower.indexOf(queryLower);
  if (matchIndex === -1) return text.slice(0, 110) + '…';
  const start = Math.max(0, matchIndex - 45);
  const end = Math.min(text.length, matchIndex + query.length + 90);
  return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
}

function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query) {
  if (!query) return text;
  return text.replace(
    new RegExp(`(${escapeRegex(query)})`, 'gi'),
    '<mark>$1</mark>'
  );
}

/* ──────────────────────────────────────────
   Search UI
────────────────────────────────────────── */
const searchInput = document.getElementById('searchInput');
const searchResultsEl = document.getElementById('searchResults');
let searchDebounce = null;

searchInput.addEventListener('focus', () => {
  buildSearchIndex();
});

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const query = searchInput.value.trim();

  if (!query) {
    searchResultsEl.classList.remove('open');
    return;
  }

  searchDebounce = setTimeout(() => {
    if (!searchIndexReady) {
      searchResultsEl.innerHTML = '<div class="search-indexing">검색 인덱스 생성 중…</div>';
      searchResultsEl.classList.add('open');
      const waitForIndex = setInterval(() => {
        if (searchIndexReady) {
          clearInterval(waitForIndex);
          runSearch(searchInput.value.trim());
        }
      }, 150);
    } else {
      runSearch(query);
    }
  }, 180);
});

function runSearch(query) {
  if (!query) return;
  const lower = query.toLowerCase();

  const matches = searchIndex.filter(lesson =>
    lesson.title.toLowerCase().includes(lower) ||
    lesson.short.toLowerCase().includes(lower) ||
    lesson.category.toLowerCase().includes(lower) ||
    lesson.text.toLowerCase().includes(lower)
  );

  if (!matches.length) {
    searchResultsEl.innerHTML = `<div class="search-no-result">검색 결과 없음: <strong>${query}</strong></div>`;
    searchResultsEl.classList.add('open');
    return;
  }

  const html = matches.map(lesson => {
    const lessonIndex = LESSONS.findIndex(l => l.id === lesson.id);
    const excerpt = getExcerpt(lesson.text, query);
    return `
      <div class="search-result-item" data-index="${lessonIndex}" role="option" tabindex="0">
        <div class="search-result-title">${highlight(lesson.title, query)}</div>
        <div class="search-result-cat">${lesson.category}</div>
        <div class="search-result-excerpt">${highlight(excerpt, query)}</div>
      </div>
    `;
  }).join('');

  searchResultsEl.innerHTML = html;
  searchResultsEl.classList.add('open');

  searchResultsEl.querySelectorAll('.search-result-item').forEach(item => {
    item.addEventListener('click', () => {
      const index = Number(item.dataset.index);
      loadLesson(index);
      closeSearch();
    });
    item.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        const index = Number(item.dataset.index);
        loadLesson(index);
        closeSearch();
      }
    });
  });
}

function closeSearch() {
  searchInput.value = '';
  searchResultsEl.classList.remove('open');
}

searchInput.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeSearch();
});

document.addEventListener('click', event => {
  if (!searchInput.contains(event.target) && !searchResultsEl.contains(event.target)) {
    searchResultsEl.classList.remove('open');
  }
});

/* ──────────────────────────────────────────
   Keyboard navigation (← →)
────────────────────────────────────────── */
document.addEventListener('keydown', event => {
  if (event.target === searchInput) return;
  if (event.key === 'ArrowRight' || event.key === 'ArrowLeft') {
    const direction = event.key === 'ArrowRight' ? 1 : -1;
    const nextIndex = currentLessonIndex + direction;
    if (nextIndex >= 0 && nextIndex < LESSONS.length) {
      loadLesson(nextIndex);
    }
  }
});

/* ──────────────────────────────────────────
   Init
────────────────────────────────────────── */
renderSidebar();

// Restore lesson from URL hash
const hash = location.hash.replace('#', '');
if (hash) {
  const lessonIndex = LESSONS.findIndex(lesson => lesson.id === hash);
  if (lessonIndex !== -1) {
    loadLesson(lessonIndex);
  }
}

// Pre-fetch search index 2s after load so it's ready when user searches
setTimeout(() => buildSearchIndex(), 2000);
</script>
</body>
</html>
